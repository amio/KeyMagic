name: TapTik
options:
  bundleIdPrefix: com.taptik
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false
    DEVELOPMENT_TEAM: "3FKXTCP8JU"
    CODE_SIGN_IDENTITY: "Apple Development"
  configs:
    Release:
      ENABLE_HARDENED_RUNTIME: true

packages:
  TapTikKit:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  TapTik:
    type: application
    platform: macOS
    sources:
      - path: Sources/TapTik
      - path: Resources/Assets.xcassets
    dependencies:
      - package: TapTikKit
        product: TapTikKit
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taptik.app
        PRODUCT_NAME: TapTik
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/TapTik.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "13"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: true
        ENABLE_TESTING_SEARCH_PATHS: true
        SPARKLE_ED_PUBLIC_KEY: ""
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"

  TapTikUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/TapTikUITests
    dependencies:
      - target: TapTik
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taptik.uitests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: TapTik

schemes:
  TapTik:
    build:
      targets:
        TapTik: all
        TapTikUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: TapTikUITests
          parallelizable: false
    archive:
      config: Release